services:
  db:
    image: postgres:16-alpine
    container_name: jurivite-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: jurivite
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: jurivite
    volumes:
      - jurivite_pgdata:/var/lib/postgresql/data

volumes:
  jurivite_pgdata:
